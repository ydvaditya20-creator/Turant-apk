name: Generate Auto Hello World APK
on: [push, workflow_dispatch]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # 1. Java Setup karna jo Android build ke liye zaruri hai
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. GitHub Server par ek naya blank Android project structure create karna
      - name: Auto Create Android Project Files
        run: |
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/java/com/example/helloworld
          
          # Root build.gradle file banana
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # settings.gradle file banana
          echo "include ':app'" > settings.gradle

          # App level build.gradle file banana
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.helloworld'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.helloworld"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # AndroidManifest.xml file banana (App ki main setting)
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://google.com">
              <application android:label="Hello World App" android:allowBackup="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # UI Layout file banana (Blank screen par Hello World text ke liye)
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://google.com"
              android:layout_width="match_match"
              android:layout_height="match_parent">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Hello World!"
                  android:textSize="24sp"
                  android:layout_centerInParent="true" />
          </RelativeLayout>
          EOF

          # MainActivity.java file banana (App ka main backend code)
          cat << 'EOF' > app/src/main/java/com/example/helloworld/MainActivity.java
          package com.example.helloworld;
          import android.app.Activity;
          import android.os.Bundle;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

      # 3. Gradle wrapper ko download aur install karna takki build run ho sake
      - name: Install Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      # 4. Saari files ko compile karke APK generate karna
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # 5. Bani hui APK ko Actions tab me upload karna download ke liye
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hello-World-APK
          path: app/build/outputs/apk/debug/app-debug.apk
