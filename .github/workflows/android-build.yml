name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # JADU STEP: Yeh purane kharab manifest ko override karke bilkul shudh manifest inject karega
    - name: Force Clean Manifest Injection
      run: |
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://android.com">
            <application
                android:allowBackup="true"
                android:label="Hello APK"
                android:supportsRtl="true">
                <activity
                    android:name="com.example.hello.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Generate Core Gradle Settings
      run: |
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "Turant-apk"
        include(":app")
        EOF

        if [ ! -f build.gradle.kts ] && [ ! -f build.gradle ]; then
          echo "// Root Build File Generated by GitHub" > build.gradle.kts
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create Local Properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Run Build with Gradle Wrapper Generation
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew clean assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
