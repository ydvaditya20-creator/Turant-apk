# .github/workflows/build.yml
name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # BACKGROUND STEP: Ye missing gradle-wrapper.jar aur baki files khud bana dega
    - name: Download and Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.2
        
    - name: Create gradle.properties and Enable AndroidX
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "org.gradle.configuration-cache=false" >> gradle.properties


    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
