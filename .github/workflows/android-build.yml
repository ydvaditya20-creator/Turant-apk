name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Isse aap manually bhi build start kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # JADU STEP: Yeh missing Gradle setup aur settings.gradle automatic generate kar dega
    - name: Generate Missing Gradle Configs
      run: |
        if [ ! -f settings.gradle.kts ] && [ ! -f settings.gradle ]; then
          echo "include(\":app\")" > settings.gradle.kts
          echo "rootProject.name = \"HelloAPK\"" >> settings.gradle.kts
        fi
        if [ ! -f build.gradle.kts ] && [ ! -f build.gradle ]; then
          echo "// Root Build File Generated by GitHub" > build.gradle.kts
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # JADU STEP 2: Gradle build tool ko download aur wrapper run karna
    - name: Run Build with Gradle Wrapper Generation
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
