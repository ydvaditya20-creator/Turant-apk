name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # FIXED STEP: Yeh sirf basic settings banayega, aapki kisi bhi app file ko touch nahi karega
    - name: Generate Core Gradle Settings
      run: |
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "Turant-apk"
        include(":app")
        EOF

        if [ ! -f build.gradle.kts ] && [ ! -f build.gradle ]; then
          echo "// Root Build File Generated by GitHub" > build.gradle.kts
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create Local Properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    # Wrapper Setup aur clean build execution
    - name: Run Build with Gradle Wrapper Generation
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew clean assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
